services:
  - type: web
    name: roshni-backend
    root_dir: ./backend
    runtime: python-3.11
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"
      - key: LOG_LEVEL
        value: INFO
      - key: BACKEND_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ALGORAND_NETWORK
        value: testnet
      - key: ALGORAND_NODE_URL
        value: https://testnet-api.algonode.cloud
      - key: ALGORAND_INDEXER_URL
        value: https://testnet-idx.algonode.cloud
      - key: ALGORAND_ADMIN_MNEMONIC
        sync: false
      - key: SUN_ASA_ID
        value: "756341116"
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DISCOM_FIXED_CHARGE
        value: "100.0"
      - key: DISCOM_ADMIN_FEE_PERCENT
        value: "2.0"
      - key: DISCOM_EXPORT_RATE
        value: "8.0"
      - key: DISCOM_GRID_RATE
        value: "12.0"
      - key: SOLAR_EXPORT_RATE
        value: "10.0"
      - key: SOLAR_POOL_RATE
        value: "9.0"
      - key: IOT_AUTH_TOKEN
        sync: false
